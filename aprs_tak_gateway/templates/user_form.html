{% extends "base.html" %}
{% block content %}
  <h2>{{ action }} User</h2>
  <form method="post" action="{{ '/user/create' if entry is none else '/user/edit/' ~ entry.id }}">
    <div class="form-row">
      <label for="aprs_call">APRS Callsign</label>
      <input type="text" id="aprs_call" name="aprs_call" required value="{{ entry.aprs_call if entry else '' }}" />
    </div>
    <div class="form-row">
      <label for="tak_uid">TAK UID</label>
      <input type="text" id="tak_uid" name="tak_uid" required value="{{ entry.tak_uid if entry else '' }}" />
    </div>
    <div class="form-row">
      <label for="tak_display_name">TAK Display Name</label>
      <input type="text" id="tak_display_name" name="tak_display_name" required value="{{ entry.tak_display_name if entry else '' }}" />
    </div>
    <div class="form-row">
      <label for="tactical_call">Tactical Call</label>
      <input type="text" id="tactical_call" name="tactical_call" value="{{ entry.tactical_call if entry else '' }}" />
    </div>
    <div class="form-row">
      <label for="team">Team</label>
      <input type="text" id="team" name="team" value="{{ entry.team if entry else '' }}" />
    </div>
    <div class="form-row">
      <label for="role">Role</label>
      <input type="text" id="role" name="role" value="{{ entry.role if entry else '' }}" />
    </div>
    <div class="form-row">
      <label for="icon">Icon</label>
      <input type="text" id="icon" name="icon" value="{{ entry.icon if entry else '' }}" />
    </div>
    <div class="form-row">
      <label for="remarks">Remarks</label>
      <textarea id="remarks" name="remarks">{{ entry.remarks if entry else '' }}</textarea>
    </div>
    <div class="form-row">
      <label><input type="checkbox" name="enabled" value="1" {% if entry is none or entry.enabled %}checked{% endif %}/> Enabled</label>
    </div>
    <div class="form-row">
      <label><input type="checkbox" name="match_all_ssids" value="1" {% if entry is none or entry.match_all_ssids %}checked{% endif %}/> Match all SSIDs</label>
    </div>
    <button class="button" type="submit">Save</button>
  </form>
{% endblock %}
