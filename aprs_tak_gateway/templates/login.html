{% extends "base.html" %}
{% block content %}
  <h2>Login</h2>
  {% if error %}
    <div class="flash">{{ error }}</div>
  {% endif %}
  <form method="post" action="/login">
    <div class="form-row">
      <label for="password">Admin Password</label>
      <input type="password" id="password" name="password" required />
    </div>
    <button class="button" type="submit">Sign in</button>
  </form>
{% endblock %}
