<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APRS-to-TAK Gateway</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f7fb; color: #202124; }
    .container { max-width: 960px; margin: 0 auto; padding: 24px; }
    header { margin-bottom: 24px; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { padding: 10px 12px; border: 1px solid #d6d9dd; text-align: left; }
    th { background: #eef2f7; }
    .button { background: #0366d6; color: white; padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; }
    .button.secondary { background: #6c757d; }
    .button.danger { background: #d73a49; }
    .form-row { margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; }
    input[type=text], textarea { width: 100%; padding: 8px; border: 1px solid #cdd4de; border-radius: 4px; }
    .topnav { margin-bottom: 16px; }
    .topnav a { margin-right: 12px; }
    .flash { background: #fff4e5; border: 1px solid #ffd59e; padding: 12px; margin-bottom: 16px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>APRS-to-TAK Gateway</h1>
      <div class="topnav">
        <a href="/">Roster</a>
        <a href="/user/create">Add User</a>
        <a href="/filter">APRS-IS Filter</a>
        <a href="/logout">Logout</a>
      </div>
    </header>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
